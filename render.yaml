services:
  - type: web
    name: stripe-terminal-backend
    env: ruby
    region: oregon
    plan: starter
    buildCommand: bundle install
    startCommand: bundle exec ruby web.rb
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: STRIPE_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false # REQUIRED: Set your LIVE Stripe secret key (sk_live_...) in the dashboard
      - key: STRIPE_CONNECTED_ACCOUNT_ID
        sync: false # REQUIRED: Your Stripe Connect account ID (acct_...) from dashboard.stripe.com/settings/account
      - key: STRIPE_ALLOW_PARAM_ACCOUNT_ID
        sync: false # Optional: Set to 'true' only for multi-tenant direct-charge flows
